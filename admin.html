<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sword Masters Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="orb orb-one"></div>

  <header class="topbar">
    <a class="brand" href="index.html">
      <img src="server-icon.png" alt="Sword Masters logo" />
      <span>SM</span>
    </a>
    <nav class="nav">
      <a href="index.html">Back to Site</a>
    </nav>
    <a class="discord-btn" href="index.html">Exit</a>
  </header>

  <main>
    <section class="hero section-reveal visible">
      <div class="hero-grid">
        <div class="hero-copy">
          <p class="kicker">Control Center</p>
          <h1>ADMIN</h1>
          <p class="hero-text">
            Placeholder dashboard for Sword Masters updates, codes, launch notes,
            and future site controls.
          </p>
          <a class="btn primary" href="index.html">Return Home</a>
        </div>

        <div class="status-panel">
          <div class="panel-header">
            <span class="dot"></span>
            <p>SYSTEM CONFIG HANDSHAKE</p>
          </div>
          <div class="code-terminal">
            <div class="terminal-top"><span></span><span></span><span></span></div>
            <p class="terminal-line">AUTH &gt; LOCAL MODE</p>
            <h3>Dashboard Ready</h3>
            <p>Add real admin tools here later.</p>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
